openapi: 3.0.0

info:
  title: Fast Search API
  version: 1.0.0
  description: Documentação da API de sugestões

servers:
  - url: http://localhost:8000/api

paths:
  /suggestions:
    post:
      summary: Criar sugestão
      tags:
        - Suggestions

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - primary_name
              properties:
                primary_name:
                  type: string
                  example: "iPhone 15"
                secondary_name:
                  type: string
                  example: "Apple"
                image_path:
                  type: string
                  example: "https://example.com/image.jpg"
                priority:
                  type: integer
                  example: 10
                type:
                  type: string
                  example: "product"
                metadata:
                  type: object
                  example:
                    brand: "Apple"
                    category: "Smartphone"
                    rating: 4.8
                    tags:
                      - "premium"
                      - "ios"
                      - "mobile"

      responses:
        201:
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "Sugestão criada com sucesso"
                  data:
                    type: object

        422:
          description: Erro de validação
  /suggestions/{id}:
    get:
      summary: Buscar sugestão por ID
      tags:
        - Suggestions

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object

        404:
          description: Sugestão não encontrada

  /suggestions/{suggestion}:
    patch:
      summary: Atualizar sugestão
      tags:
        - Suggestions

      parameters:
        - name: suggestion
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                primary_name:
                  type: string
                  example: "iPhone 15 Pro"
                secondary_name:
                  type: string
                  example: "Apple"
                image_path:
                  type: string
                  example: "https://example.com/image.jpg"
                priority:
                  type: integer
                  example: 20
                type:
                  type: string
                  example: "product"
                metadata:
                  type: object

      responses:
        200:
          description: Atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Sugestão atualizada com sucesso"
                  data:
                    type: object

        404:
          description: Sugestão não encontrada

        422:
          description: Erro de validação

    delete:
      summary: Remover sugestão
      tags:
        - Suggestions

      parameters:
        - name: suggestion
          in: path
          required: true
          schema:
            type: integer

      responses:
        204:
          description: Removido com sucesso (sem conteúdo)

        404:
          description: Sugestão não encontrada