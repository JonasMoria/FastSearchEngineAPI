openapi: 3.0.0

info:
  title: Fast Search API
  version: 1.0.0
  description: Documentação da API de sugestões

servers:
  - url: http://localhost:8000/api

paths:
  /suggestions:
    post:
      summary: Criar sugestão
      tags:
        - Suggestions

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - primary_name
              properties:
                primary_name:
                  type: string
                  example: "iPhone 15"
                secondary_name:
                  type: string
                  example: "Apple"
                image_path:
                  type: string
                  example: "https://example.com/image.jpg"
                priority:
                  type: integer
                  example: 10
                type:
                  type: string
                  example: "product"
                metadata:
                  type: object
                  example:
                    brand: "Apple"
                    category: "Smartphone"
                    rating: 4.8
                    tags:
                      - "premium"
                      - "ios"
                      - "mobile"

      responses:
        201:
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "Sugestão criada com sucesso"
                  data:
                    type: object

        422:
          description: Erro de validação
  /suggestions/{id}:
    get:
      summary: Buscar sugestão por ID
      tags:
        - Suggestions

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object

        404:
          description: Sugestão não encontrada
  /suggestions/{suggestion}:
    patch:
      summary: Atualizar sugestão
      tags:
        - Suggestions

      parameters:
        - name: suggestion
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                primary_name:
                  type: string
                  example: "iPhone 15 Pro"
                secondary_name:
                  type: string
                  example: "Apple"
                image_path:
                  type: string
                  example: "https://example.com/image.jpg"
                priority:
                  type: integer
                  example: 20
                type:
                  type: string
                  example: "product"
                metadata:
                  type: object

      responses:
        200:
          description: Atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Sugestão atualizada com sucesso"
                  data:
                    type: object

        404:
          description: Sugestão não encontrada

        422:
          description: Erro de validação

    delete:
      summary: Remover sugestão
      tags:
        - Suggestions

      parameters:
        - name: suggestion
          in: path
          required: true
          schema:
            type: integer

      responses:
        204:
          description: Removido com sucesso (sem conteúdo)

        404:
          description: Sugestão não encontrada
  /suggestions/search:
    get:
      summary: Buscar sugestões
      description: |
        Realiza busca de sugestões utilizando RediSearch com suporte a prefixo (autocomplete).
        A busca é feita nos campos `primary_name` e `secondary_name`, ordenada por prioridade.

      tags:
        - Suggestions

      parameters:
        - name: q
          in: query
          required: true
          description: Texto da busca
          schema:
            type: string
            minLength: 3
            example: "iph"

      responses:
        200:
          description: Lista de sugestões encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Sucesso"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "1"
                        primary_name:
                          type: string
                          example: "iphone 15"
                        secondary_name:
                          type: string
                          example: "apple"
                        type:
                          type: string
                          example: "product"
                        priority:
                          type: string
                          example: "10"

        422:
          description: Parâmetro inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 422
                  message:
                    type: string
                    example: "Parâmetro q é obrigatório"

        500:
          description: Erro interno na busca
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: "Erro ao buscar sugestões"

  /redis/init:
    post:
      summary: Inicializar Redis e recriar índice de sugestões
      description: |
        Limpa todos os dados do Redis, recria o índice do RediSearch e dispara a reindexação assíncrona das sugestões.
      tags:
        - Redis

      responses:
        200:
          description: Redis inicializado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Redis iniciado com sucesso"
                  data:
                    type: object
                    example: {}

        500:
          description: Erro ao inicializar Redis
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: "Não foi possível inicializar o Redis"