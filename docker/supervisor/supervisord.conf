[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
redirect_stderr=true

[program:queue]
command=php /var/www/artisan queue:work --sleep=3 --tries=3 --timeout=60
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
redirect_stderr=true

[program:scheduler]
command=php /var/www/artisan schedule:work
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
redirect_stderr=true